<html>
    <head>
        <link rel="stylesheet" href="./global.css" />
        <script src="./libs/darkreader.js"></script>

        <script src="./libs/linkify.min.js"></script>
        <script src="./libs/linkify-element.min.js"></script>

        <style>
            body {
                padding-left: 12px;
                padding-right: 12px;
                padding-top: 8px;
                padding-bottom: 8px;
                margin: 0px;
                border-radius: 8px;
            }

            #readerDiv {
                font-family: Arial, Helvetica, sans-serif;
                background-color: transparent !important;
            }

            a.wino-plain-link {
                color: inherit !important;
                text-decoration: underline dotted !important;
            }

            .screen-reader-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: pre-wrap;
                border: 0;
            }
        </style>
    </head>
    <body>
        <meta name="color-scheme" content="dark light" />
        <script>
            var _htmlString = "";
            var _shouldLinkifyText = true;
            var _bodyLabel = "Message body";
            var _fallbackLabel = "Plain text message body";

            // Called when rendering a new email for the first time
            function RenderHTML(htmlString, shouldLinkifyText = true) {

                // Reset scroll to top
                window.scroll(0, 0);

                // Clear any existing selection
                window.getSelection().removeAllRanges();

                _htmlString = htmlString;
                _shouldLinkifyText = shouldLinkifyText;

                internalRenderHTML(htmlString);
            }

            // Called to render or refresh the email
            function internalRenderHTML(htmlString) {
                var containerDiv = document.getElementById("readerDiv");
                try {
                    containerDiv.innerHTML = htmlString;

                    // Linkify plain text links if enabled
                    if (_shouldLinkifyText) {
                        linkifyElement(
                            containerDiv,
                            { className: "wino-plain-link" },
                            document
                        );
                    }

                    // Remove !important from inline styles if dark mode is enabled
                    if (
                        document.documentElement.getAttribute("data-theme") ===
                        "dark"
                    ) {
                        removeImportantFromInlineStyles();
                    }
                } catch (e) {
                    containerDiv.innerHTML = htmlString;
                }
            }

            function ChangeFontFamily(fontFamily) {
                var containerDiv = document.getElementById("readerDiv");
                containerDiv.style.fontFamily = fontFamily;
            }

            function ChangeFontSize(size) {
                var containerDiv = document.getElementById("readerDiv");
                containerDiv.style.fontSize = size;
            }

            function GetRenderedHtml() {
                return _htmlString || "";
            }

            function SetAccessibleMailContext(subject, sender, creationDate, bodyLabel, fallbackLabel, accessibleText) {
                _bodyLabel = bodyLabel || _bodyLabel;
                _fallbackLabel = fallbackLabel || _fallbackLabel;

                var contextParts = [];

                if (subject) {
                    document.title = subject;
                    contextParts.push(subject);
                }

                if (sender) {
                    contextParts.push(sender);
                }

                if (creationDate) {
                    contextParts.push(creationDate);
                }

                var containerDiv = document.getElementById("readerDiv");
                var fallbackDiv = document.getElementById("accessibleTextFallback");
                var contextLabel = contextParts.length > 0 ? _bodyLabel + ". " + contextParts.join(". ") : _bodyLabel;

                containerDiv.setAttribute("aria-label", contextLabel);
                fallbackDiv.setAttribute("aria-label", _fallbackLabel);
                fallbackDiv.textContent = accessibleText || "";
                fallbackDiv.hidden = !accessibleText;
            }

            function SetLightEditor() {
                document.documentElement.setAttribute("data-theme", "light");
                DarkReader.disable();

                internalRenderHTML(_htmlString);
            }

            function SetDarkEditor() {
                document.documentElement.setAttribute("data-theme", "dark");
                DarkReader.enable();

                internalRenderHTML(_htmlString);
            }

            // Helper functions
            function removeImportantFromInlineStyles() {
                var allElements = document.querySelectorAll("*");
                allElements.forEach(function (element) {
                    var style = element.getAttribute("style");
                    if (style) {
                        var newStyle = style.replace(/!important/g, "");
                        element.setAttribute("style", newStyle);
                    }
                });
            }
        </script>
        <main>
            <article id="readerDiv" role="document" tabindex="0" aria-label="Message body"></article>
            <section id="accessibleTextFallback" class="screen-reader-only" tabindex="0" aria-label="Plain text message body" hidden></section>
        </main>
    </body>
</html>
